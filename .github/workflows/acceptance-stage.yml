name: acceptance-stage

on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run (even if no new images)'
        required: false
        default: false
        type: boolean

jobs:

  find-latest-images:
    runs-on: ubuntu-latest
    outputs:
      image-digest-urls: ${{ steps.get-digest.outputs.image-digest-urls }}
      latest-image-timestamp: ${{ steps.get-digest.outputs.latest-image-timestamp }}

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Latest Docker Digests
        id: get-digest
        uses: optivem/find-latest-docker-images-action@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/eshop/frontend:latest
            ghcr.io/${{ github.repository_owner }}/eshop/backend:latest

  should-run:
    needs: find-latest-images
    if: needs.find-latest-images.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Should Run Acceptance Stage
        id: check
        uses: optivem/should-run-acceptance-stage-action@v1
        with:
          latest-image-timestamp: ${{ needs.find-latest-images.outputs.latest-image-timestamp }}
          force-run: ${{ inputs.force_run == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  system-test:
    needs: [ should-run, find-latest-images ]
    if: needs.should-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy System (Real External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.find-latest-images.outputs.image-digest-urls }}
          external-system-mode: 'real'
          frontend-url: 'http://localhost:3001/'
          backend-url: 'http://localhost:8081/health'
          erp-url: 'http://localhost:9001/erp/health'
          tax-url: 'http://localhost:9001/tax/health'

      - name: Deploy System (Stub External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.find-latest-images.outputs.image-digest-urls }}
          external-system-mode: 'stub'
          frontend-url: 'http://localhost:3002/'
          backend-url: 'http://localhost:8082/health'
          erp-url: 'http://localhost:9002/erp/health'
          tax-url: 'http://localhost:9002/tax/health'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: system-test

      # === v1 ===
      - name: v1 - Smoke
        run: npx playwright test --project=smoke-test tests/v1/smoke
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: v1 - E2E
        run: npx playwright test --project=e2e-test tests/v1/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance

      # === v2 ===
      - name: v2 - Smoke
        run: npx playwright test --project=smoke-test tests/v2/smoke
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: v2 - E2E
        run: npx playwright test --project=e2e-test tests/v2/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance

      # === v3 ===
      - name: v3 - Smoke
        run: npx playwright test --project=smoke-test tests/v3/smoke
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: v3 - E2E
        run: npx playwright test --project=e2e-test tests/v3/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      # === v4 ===
      - name: v4 - Smoke
        run: npx playwright test --project=smoke-test tests/v4/smoke
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: v4 - E2E - API Channel
        run: npx playwright test --project=e2e-test tests/v4/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: API

      - name: v4 - E2E - UI Channel
        run: npx playwright test --project=e2e-test tests/v4/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: UI

      # === v5 ===
      - name: v5 - Smoke
        run: npx playwright test --project=smoke-test tests/v5/smoke
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: v5 - E2E - API Channel
        run: npx playwright test --project=e2e-test tests/v5/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: API

      - name: v5 - E2E - UI Channel
        run: npx playwright test --project=e2e-test tests/v5/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: UI

      # === v6 ===
      - name: v6 - Smoke
        run: npx playwright test --project=smoke-test tests/v6/smoke
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: v6 - E2E - API Channel
        run: npx playwright test --project=e2e-test tests/v6/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: API

      - name: v6 - E2E - UI Channel
        run: npx playwright test --project=e2e-test tests/v6/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL
          CHANNEL: UI

      # === v7 ===
      - name: v7 - Smoke (Stub)
        run: npx playwright test --project=smoke-test tests/v7/smoke
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB

      - name: v7 - Smoke (Real)
        run: npx playwright test --project=smoke-test tests/v7/smoke
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: v7 - Acceptance - API Channel
        run: npx playwright test --project=acceptance-test --grep-invert "@isolated"
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: API

      - name: v7 - Acceptance - UI Channel
        run: npx playwright test --project=acceptance-test --grep-invert "@isolated"
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: UI

      - name: v7 - Acceptance (Isolated) - API Channel
        run: npx playwright test --project=acceptance-test --grep "@isolated" --workers=1
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: API

      - name: v7 - Acceptance (Isolated) - UI Channel
        run: npx playwright test --project=acceptance-test --grep "@isolated" --workers=1
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB
          CHANNEL: UI

      - name: v7 - Contract (Stub)
        run: npx playwright test --project=external-system-contract-test --workers=1
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: STUB

      - name: v7 - Contract (Real)
        run: npx playwright test --project=external-system-contract-test --workers=1
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          EXTERNAL_SYSTEM_MODE: REAL

      - name: v7 - E2E - API Channel
        run: npx playwright test --project=e2e-test tests/v7/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          CHANNEL: API

      - name: v7 - E2E - UI Channel
        run: npx playwright test --project=e2e-test tests/v7/e2e
        working-directory: system-test
        env:
          ENVIRONMENT: acceptance
          CHANNEL: UI